---
name: Fedora Exousia DevSec CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      fedora_version:
        description: 'Fedora version to build'
        required: true
        type: choice
        options:
          - '42'
          - '43'
          - '41'
          - 'rawhide'
        default: '42'
      push_image:
        description: 'Push to registry'
        type: boolean
        default: true
  schedule:
    - cron: "30 5 * * *" # Nightly build at 5:30 AM UTC

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  security-events: write

concurrency:
  group: fedora-exousia-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  FEDORA_VERSION: "42"
  IMAGE_NAME: fedora-exousia

jobs:
  # ======================== BUILD STAGE ========================= #
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      fedora_version: ${{ steps.config.outputs.BUILD_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve build configuration
        id: config
        env:
          INPUT_VERSION: ${{ github.event.inputs.fedora_version || '42' }}
        run: |
          echo "BUILD_VERSION=$INPUT_VERSION" >> $GITHUB_OUTPUT
          echo "### 🔧 Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Fedora Version:** $INPUT_VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long
            type=ref,event=branch
            type=schedule,pattern=nightly
          labels: |
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.description=Fedora Exousia bootc image with K8s tools, Sway, and virtualization

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Setup Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build container with Nix
        env:
          REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          nix build .#container --print-build-logs

      - name: Load and tag image
        run: |
          # Load the Nix-built image
          docker load < result

          # Tag with metadata
          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'); do
            if [ "$tag" != "$SOURCE_IMAGE" ]; then
              docker tag "$SOURCE_IMAGE" "$tag"
            fi
          done

      - name: Export image for other jobs
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          docker save "$IMAGE" -o fedora-exousia.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-exousia-image
          path: fedora-exousia.tar
          retention-days: 1

  # ======================== TEST STAGE ========================== #
  test:
    name: Test Image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: fedora-exousia-image

      - name: Load image
        run: |
          docker load < fedora-exousia.tar

      - name: Setup Bats testing framework
        id: setup-bats
        uses: bats-core/bats-action@3.0.0

      - name: Run BATS tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
          TEST_IMAGE_TAG: "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
        run: |
          docker run --rm "$TEST_IMAGE_TAG" bash -c "cd /tests && bats -r container/" || true

      - name: Verify bootc compliance
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          docker run --rm "$IMAGE" bootc container lint || \
            echo "::warning::bootc container lint found issues"

      - name: Verify ostree-based system
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          docker run --rm "$IMAGE" test -f /run/ostree-booted || \
            echo "::warning::System may not be ostree-based"

  # ======================== SCAN STAGE ========================== #
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: fedora-exousia-image

      - name: Load image
        run: |
          docker load < fedora-exousia.tar

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-v2

      - name: Install Trivy
        run: |
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.52.2/trivy_0.52.2_Linux-64bit.tar.gz \
            | tar -xz -C /usr/local/bin trivy

      - name: Trivy vulnerability scan
        continue-on-error: true
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          trivy image "$IMAGE" \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table || echo "::warning::Trivy found CRITICAL or HIGH vulnerabilities"

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: 'custom-scripts/*'

  # ======================== PUSH STAGE ========================== #
  push:
    name: Push & Sign Image
    runs-on: ubuntu-latest
    needs: [build, test, scan]
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
    timeout-minutes: 15

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: fedora-exousia-image

      - name: Load image
        run: |
          docker load < fedora-exousia.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push images to Docker Hub
        id: push
        run: |
          for tag in $(echo "${{ needs.build.outputs.image_tag }}" | tr ',' '\n'); do
            echo "Pushing $tag"
            docker push "$tag"
          done

          # Get digest of latest tag
          DIGEST=$(docker inspect "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign container images
        run: |
          echo "Signing image by digest: ${{ steps.push.outputs.digest }}"
          cosign sign --yes "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ======================== SUMMARY STAGE ========================== #
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, test, scan, push]
    if: always()

    steps:
      - name: Generate build summary
        run: |
          echo "## 🚀 Fedora Exousia DevSec CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test:** ${{ needs.test.result == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan:** ${{ needs.scan.result == 'success' && '✅ Success' || '⚠️ Issues Found' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Push:** ${{ needs.push.result == 'success' && '✅ Success' || (needs.push.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Fedora Version: \`${{ needs.build.outputs.fedora_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image Type: \`bootc (ostree-based)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.push.result }}" == "success" ]]; then
            echo "### 📦 Published & Signed Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- Signed with Cosign + Sigstore" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📚 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [ansible-bender Documentation](https://ansible-community.github.io/ansible-bender/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Fedora bootc Documentation](https://docs.fedoraproject.org/en-US/bootc/)" >> $GITHUB_STEP_SUMMARY
