---
name: Fedora Sericea Bootc DevSec CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push to registry'
        type: boolean
        default: true
  schedule:
    - cron: "30 5 * * *" # Nightly build at 5:30 AM UTC

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  security-events: write

concurrency:
  group: fedora-exousia-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  FEDORA_VERSION: "42"
  IMAGE_NAME: fedora-exousia

jobs:
  # ======================== BUILD & TEST STAGE ========================= #

  build:
    name: Build & Test Image
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and ansible-bender
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-bender

      - name: Install Ansible requirements
        run: |
          cd ansible
          ansible-galaxy install -r requirements.yml

      - name: Build image with ansible-bender
        run: |
          ansible-bender build \
            --extra-vars "fedora_version=${{ env.FEDORA_VERSION }} registry=${{ env.REGISTRY }} registry_username=${{ secrets.DOCKERHUB_USERNAME || 'test' }}" \
            ansible/playbooks/build-image.yml

      - name: Setup Bats testing framework
        id: setup-bats
        uses: bats-core/bats-action@3.0.0

      - name: Run BATS tests on built image
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
          TEST_IMAGE_TAG: "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest"
        run: |
          buildah unshare -- bats -r tests/container/

      - name: Verify ostree-based system
        run: |
          echo "Verifying bootc/ostree configuration..."
          buildah run $(buildah from --pull-never "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest") -- \
            test -f /run/ostree-booted || echo "::warning::System may not be ostree-based"

      - name: Verify RPM Fusion ostree installation
        run: |
          echo "Checking RPM Fusion ostree repositories..."
          CONTAINER=$(buildah from --pull-never "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest")

          # Check RPM Fusion packages are installed
          buildah run "$CONTAINER" -- rpm -q rpmfusion-free-release rpmfusion-nonfree-release || {
            echo "::error::RPM Fusion packages not found"
            exit 1
          }

          # Verify unversioned repos (not tied to specific Fedora version)
          buildah run "$CONTAINER" -- sh -c "rpm -q rpmfusion-free-release | grep -qv 'fc[0-9]'" || {
            echo "::warning::RPM Fusion may not be using unversioned repositories"
          }

          # Check repo files exist
          MOUNT=$(buildah mount "$CONTAINER")
          test -f "$MOUNT/etc/yum.repos.d/rpmfusion-free.repo" || {
            echo "::error::RPM Fusion repo files not found"
            buildah umount "$CONTAINER"
            exit 1
          }
          buildah umount "$CONTAINER"
          buildah rm "$CONTAINER"

          echo "✅ RPM Fusion ostree setup verified"

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-v2

      - name: Install Trivy
        run: |
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.52.2/trivy_0.52.2_Linux-64bit.tar.gz \
            | tar -xz -C /usr/local/bin trivy

      - name: Trivy vulnerability scan
        run: |
          trivy image "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest" \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table

          # Run again with exit-code 1 to fail on critical/high vulns
          trivy image "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest" \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table || {
              echo "::warning::Critical or high vulnerabilities found in image"
            }

      - name: Login to Docker Hub
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          buildah push "${IMAGE}"
          buildah push "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.FEDORA_VERSION }}"

      - name: Install Cosign
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the container image
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest"
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Generate build metadata
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          buildah inspect "${IMAGE}" > build-metadata.json

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: fedora-exousia-metadata
          path: build-metadata.json

  # ======================== SUMMARY STAGE ========================== #

  build-summary:
    name: Generate Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: manifests/

      - name: Generate build summary
        run: |
          echo "## 🚀 DevSec Fedora Sericea Bootc CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔨 Build & Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Fedora Version: \`${{ env.FEDORA_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image Type: \`bootc (ostree-based)\`" >> $GITHUB_STEP_SUMMARY
          echo "- RPM Fusion: \`ostree two-stage setup\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" != "pull_request" && "${{ needs.build.result }}" == "success" ]]; then
            echo "### 📦 Published & Signed Image" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- Signed with Cosign + Sigstore" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📚 Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ansible-bender Documentation](https://ansible-community.github.io/ansible-bender/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Ansible Playbooks](ansible/README.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Test Results](tests/README.md)" >> $GITHUB_STEP_SUMMARY
