---
name: Packer DevSecOps CI

on:
  push:
    branches: [main]
    paths:
      - 'packer/**'
      - 'ansible/**'
      - '.github/workflows/packer-devsec-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packer/**'
      - 'ansible/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push to registry'
        type: boolean
        default: true
  schedule:
    - cron: "30 5 * * *" # Nightly build at 5:30 AM UTC

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write
  security-events: write

concurrency:
  group: packer-devsec-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKER_VERSION: "1.10.0"
  REGISTRY: docker.io
  FEDORA_VERSION: "43"

jobs:
  # ======================== BUILD, TEST, SCAN, PUSH, SIGN ========================= #

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install Ansible requirements
        run: |
          cd ansible
          ansible-galaxy install -r requirements.yml

      - name: Initialize Packer
        run: |
          cd packer/fedora-exousia
          packer init .

      - name: Validate Packer template
        run: |
          cd packer/fedora-exousia
          packer validate .

      - name: Build image (without push)
        run: |
          cd packer/fedora-exousia
          packer build \
            -var "fedora_version=${{ env.FEDORA_VERSION }}" \
            -var "registry=${{ env.REGISTRY }}" \
            -var "registry_username=${{ secrets.DOCKERHUB_USERNAME || 'test' }}" \
            -except="docker-push" \
            .

      - name: Setup Bats testing framework
        id: setup-bats
        uses: bats-core/bats-action@3.0.0

      - name: Run BATS tests on built image
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
          TEST_IMAGE_TAG: "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest"
        run: |
          buildah unshare -- bats -r tests/container/

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-v2

      - name: Install Trivy
        run: |
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.52.2/trivy_0.52.2_Linux-64bit.tar.gz \
            | tar -xz -C /usr/local/bin trivy

      - name: Trivy vulnerability scan
        continue-on-error: true
        run: |
          trivy image "${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest" \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table || echo "::warning::Trivy found vulnerabilities."

      - name: Login to Docker Hub
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        run: |
          cd packer/fedora-exousia

          export REGISTRY_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          export REGISTRY_PASSWORD="${{ secrets.DOCKERHUB_TOKEN }}"

          packer build \
            -var "fedora_version=${{ env.FEDORA_VERSION }}" \
            -var "registry=${{ env.REGISTRY }}" \
            -var "registry_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            .

      - name: Install Cosign
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the container image
        if: |
          (github.event_name != 'pull_request') &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest"
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: fedora-exousia-manifest
          path: packer/fedora-exousia/manifest-${{ env.FEDORA_VERSION }}.json

  # ======================== SUMMARY STAGE ========================== #

  build-summary:
    name: Generate Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Download all manifests
        uses: actions/download-artifact@v4
        with:
          path: manifests/

      - name: Generate build summary
        run: |
          echo "## 🚀 Packer Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Fedora Version: \`${{ env.FEDORA_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "### 📦 Published Images" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Exousia:** \`${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/fedora-exousia:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📚 Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Packer Documentation](https://www.packer.io/docs)" >> $GITHUB_STEP_SUMMARY
          echo "- [Ansible Playbooks](ansible/README.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [Test Results](tests/README.md)" >> $GITHUB_STEP_SUMMARY
