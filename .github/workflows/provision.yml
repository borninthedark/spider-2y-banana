---
name: Provision Fedora System

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: 'Target host or inventory group'
        required: true
        default: 'all'
      enable_k8s:
        description: 'Enable Kubernetes tools'
        type: boolean
        default: true
      enable_virt:
        description: 'Enable virtualization'
        type: boolean
        default: true
      tags:
        description: 'Ansible tags (comma-separated)'
        required: false
        default: ''

jobs:
  provision:
    name: Run Ansible Provisioning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v4
        with:
          playbook: playbooks/provision.yml
          directory: ./ansible
          requirements: requirements.yml
          options: |
            --inventory inventory/hosts
            --extra-vars enable_k8s_tools=${{ github.event.inputs.enable_k8s }}
            --extra-vars enable_virtualization=${{ github.event.inputs.enable_virt }}
            --extra-vars ansible_user=root
            --become
            ${{ github.event.inputs.tags && format('--tags {0}', github.event.inputs.tags) || '' }}

      - name: Display provisioning summary
        run: echo "Provisioning completed successfully!"
