---
# Base packages installation tasks

- name: Install python3-libdnf5 for dnf5 backend support
  ansible.builtin.command:
    cmd: dnf5 install -y python3-libdnf5
  when: ansible_pkg_mgr == 'dnf5'
  changed_when: false
  failed_when: false

- name: Install RPM Fusion repositories
  ansible.builtin.command:
    cmd: dnf5 install -y "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_version }}.noarch.rpm" "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_version }}.noarch.rpm" --nogpgcheck
  when: ansible_pkg_mgr == 'dnf5'
  register: rpmfusion_install
  changed_when: "'already installed' not in rpmfusion_install.stdout"
  failed_when: rpmfusion_install.rc != 0 and 'already installed' not in rpmfusion_install.stdout

- name: Install RPM Fusion repositories (dnf fallback)
  ansible.builtin.dnf:
    name:
      - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_version }}.noarch.rpm"
      - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: ansible_pkg_mgr != 'dnf5'

- name: Enable Cisco OpenH264 repository
  ansible.builtin.command:
    cmd: "{{ 'dnf5' if ansible_pkg_mgr == 'dnf5' else 'dnf' }} config-manager setopt fedora-cisco-openh264.enabled=1"
  changed_when: false

- name: Install core utilities
  ansible.builtin.dnf:
    name: "{{ base_packages_core_utilities }}"
    state: present

- name: Install audio and media packages
  ansible.builtin.dnf:
    name: "{{ base_packages_audio_media_packages }}"
    state: present
  when: base_packages_audio_media_packages | length > 0

- name: Install development tools
  ansible.builtin.dnf:
    name: "{{ base_packages_developer_tools }}"
    state: present

- name: Install cloud tools
  ansible.builtin.dnf:
    name: "{{ cloud_tools }}"
    state: present
  when: cloud_tools | length > 0

- name: Install security tools
  ansible.builtin.dnf:
    name: "{{ base_packages_security_tools }}"
    state: present

- name: Install power user tools
  ansible.builtin.dnf:
    name: "{{ base_packages_power_user_tools }}"
    state: present
  when: base_packages_power_user_tools | length > 0

- name: Install extra packages
  ansible.builtin.dnf:
    name: "{{ extra_packages }}"
    state: present
  when: extra_packages | length > 0

- name: Install Plymouth packages
  ansible.builtin.dnf:
    name: "{{ plymouth_packages }}"
    state: present
  when: plymouth_packages | length > 0

- name: Install virtualization packages
  ansible.builtin.dnf:
    name: "{{ base_packages_virtualization_packages }}"
    state: present
  when: base_packages_virtualization_packages | length > 0

- name: Remove unwanted packages
  ansible.builtin.dnf:
    name: "{{ packages_to_remove }}"
    state: absent
  when: packages_to_remove | length > 0

- name: Upgrade all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
  when: base_packages_upgrade_all_packages | bool
