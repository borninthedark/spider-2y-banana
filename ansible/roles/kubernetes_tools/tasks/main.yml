---
# Kubernetes tools installation tasks

- name: Install base Kubernetes packages
  ansible.builtin.dnf:
    name: "{{ k8s_base_packages }}"
    state: present

- name: Create directories for binaries
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: '0755'

- name: Download and install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  when: install_kubectl | bool

- name: Download and install Helm
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp
    remote_src: true
  when: install_helm | bool

- name: Move Helm binary to /usr/local/bin
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: true
  when: install_helm | bool

- name: Download and install k3s
  ansible.builtin.get_url:
    url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
    dest: /usr/local/bin/k3s
    mode: '0755'
  when: install_k3s | bool

- name: Download and install ArgoCD CLI
  ansible.builtin.get_url:
    url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_version }}/argocd-linux-amd64"
    dest: /usr/local/bin/argocd
    mode: '0755'
  when: install_argocd | bool

- name: Download and install k3d
  ansible.builtin.shell: |
    curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="{{ k3d_version }}" bash
  args:
    creates: /usr/local/bin/k3d
  when: install_k3d | bool

- name: Enable cgroup v2 delegation for rootless k3s
  ansible.builtin.copy:
    content: |
      [Service]
      Delegate=cpu cpuset io memory pids
    dest: /etc/systemd/system/user@.service.d/delegate.conf
    mode: '0644'
  notify: Reload systemd
  when: install_k3s | bool

- name: Create k3s directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/lib/rancher/k3s
    - /etc/rancher/k3s
  when: install_k3s | bool

- name: Create systemd user directory for skeleton
  ansible.builtin.file:
    path: /etc/skel/.config/systemd/user
    state: directory
    mode: '0755'
  when: install_k3s | bool

- name: Download k3s-rootless systemd service template
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/k3s-io/k3s/master/k3s-rootless.service
    dest: /etc/skel/.config/systemd/user/k3s-rootless.service
    mode: '0644'
  when: install_k3s | bool

- name: Configure k3s-rootless service
  ansible.builtin.lineinfile:
    path: /etc/skel/.config/systemd/user/k3s-rootless.service
    regexp: '^ExecStart='
    line: 'ExecStart=/usr/local/bin/k3s server --rootless --disable traefik --disable servicelb --write-kubeconfig-mode=644 --tls-san=localhost'
  when: install_k3s | bool

- name: Add environment variables to k3s-rootless service
  ansible.builtin.blockinfile:
    path: /etc/skel/.config/systemd/user/k3s-rootless.service
    insertafter: '^\[Service\]'
    block: |
      Environment=K3S_KUBECONFIG_OUTPUT=/home/%u/.kube/k3s.yaml
      Environment=K3S_KUBECONFIG_MODE=644
  when: install_k3s | bool

- name: Add KUBECONFIG to default bashrc
  ansible.builtin.lineinfile:
    path: /etc/skel/.bashrc
    line: "{{ item }}"
    create: true
  loop:
    - 'export KUBECONFIG=~/.kube/k3s.yaml'
    - 'export PATH="$HOME/.local/bin:$PATH"'
  when: install_k3s | bool

- name: Cleanup temp files
  ansible.builtin.file:
    path: /tmp/linux-amd64
    state: absent
