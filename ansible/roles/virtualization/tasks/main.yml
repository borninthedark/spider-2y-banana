---
# Virtualization setup tasks

- name: Install virtualization packages
  community.general.dnf5:
    name: "{{ virtualization_packages }}"
    state: present
  when: ansible_pkg_mgr == 'dnf5'

- name: Install virtualization packages (dnf fallback)
  ansible.builtin.dnf:
    name: "{{ virtualization_packages }}"
    state: present
  when: ansible_pkg_mgr != 'dnf5'

- name: Enable libvirtd service
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Add user to libvirt group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: libvirt
    append: true
  when: ansible_user_id is defined
